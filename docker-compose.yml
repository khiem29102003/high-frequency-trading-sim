services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hfts
      POSTGRES_USER: hfts
      POSTGRES_PASSWORD: hfts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: 3001
      JWT_SECRET: change-me-in-prod
      JWT_EXPIRES_IN: 1d
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://hfts:hfts@postgres:5432/hfts?schema=public
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"
    command: sh -c "npm -w @hfts/api run db:deploy && npm -w @hfts/api run db:seed && node apps/api/dist/main.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: http://localhost:3001/ws
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
